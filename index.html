<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Freight Rate Calculator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f7fa;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #1a3c6d;
    }
    form {
      display: grid;
      gap: 1.2rem;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 0.4rem;
    }
    input, select {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 1rem;
    }
    button {
      background: #1a3c6d;
      color: white;
      border: none;
      padding: 1rem;
      font-size: 1.1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #0f2550;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    #result {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 8px;
      background: #e8f4fd;
      border: 1px solid #b3d4fc;
      min-height: 100px;
    }
    #error {
      color: #d32f2f;
      font-weight: bold;
      margin-top: 1rem;
    }
    .section {
      border-bottom: 1px solid #eee;
      padding-bottom: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .section:last-child {
      border-bottom: none;
    }
    @media (max-width: 600px) {
      .container { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Truckload Freight Rate Calculator</h1>
    
    <form id="rateForm">
      <div class="section">
        <h3>Pickup Location</h3>
        <label for="originAddress">Address</label>
        <input type="text" id="originAddress" placeholder="123 Main St" required />

        <label for="originCity">City</label>
        <input type="text" id="originCity" placeholder="Richmond" required />

        <label for="originState">State (2-letter code)</label>
        <input type="text" id="originState" placeholder="VA" maxlength="2" required />
      </div>

      <div class="section">
        <h3>Delivery Location</h3>
        <label for="destAddress">Address</label>
        <input type="text" id="destAddress" placeholder="456 Elm Ave" required />

        <label for="destCity">City</label>
        <input type="text" id="destCity" placeholder="Norfolk" required />

        <label for="destState">State (2-letter code)</label>
        <input type="text" id="destState" placeholder="VA" maxlength="2" required />
      </div>

      <div class="section">
        <h3>Shipment Details</h3>
        <label for="equipmentType">Equipment Type</label>
        <select id="equipmentType" required>
          <option value="">Select...</option>
          <option value="Vans">Vans</option>
          <option value="Reefers">Reefers</option>
          <option value="Flatbeds">Flatbeds</option>
        </select>

        <label for="feet">Length (feet, up to 53)</label>
        <input type="number" id="feet" min="1" max="53" value="53" required />

        <label for="weight">Weight (lbs, up to 45000)</label>
        <input type="number" id="weight" min="1" max="45000" value="45000" required />

        <label for="weightUnit">Weight Unit</label>
        <select id="weightUnit" required>
          <option value="LBS">LBS</option>
        </select>

        <label for="pickupDate">Pickup Date (MM/DD/YYYY)</label>
        <input type="text" id="pickupDate" placeholder="03/15/2026" pattern="\d{2}/\d{2}/\d{4}" required />
      </div>

      <div class="section">
        <label for="services">Optional Services (comma-separated IDs, e.g., 1,3 — get IDs from /service-rates endpoint)</label>
        <input type="text" id="services" placeholder="Leave blank if none" />
      </div>

      <button type="submit" id="submitBtn">Calculate Rate</button>
    </form>

    <div id="result"></div>
    <div id="error"></div>
  </div>

  <script>
    const API_TOKEN = "YOUR_API_TOKEN_HERE"; // ← Replace with your real token from truckquote.com/profile
    const BASE_URL = "https://api.truckquote.com/api/v1";

    const form = document.getElementById("rateForm");
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorDiv.textContent = "";
      resultDiv.innerHTML = "<p>Loading...</p>";
      submitBtn.disabled = true;

      const servicesInput = document.getElementById("services").value.trim();
      const services = servicesInput ? servicesInput.split(",").map(s => s.trim()) : [];

      const payload = {
        equipment_type: document.getElementById("equipmentType").value,
        feet: parseInt(document.getElementById("feet").value),
        date: document.getElementById("pickupDate").value,
        weight: parseInt(document.getElementById("weight").value),
        weight_unit: document.getElementById("weightUnit").value,
        stops: [
          {
            address: document.getElementById("originAddress").value,
            city: document.getElementById("originCity").value,
            state: document.getElementById("originState").value.toUpperCase()
          },
          {
            address: document.getElementById("destAddress").value,
            city: document.getElementById("destCity").value,
            state: document.getElementById("destState").value.toUpperCase()
          }
        ],
        selectedServices: services
      };

      try {
        const response = await fetch(`${BASE_URL}/quotes`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": API_TOKEN
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`API error: ${response.status} - ${errText}`);
        }

        const data = await response.json();

        // TruckQuote response structure is not fully public, but based on docs/examples:
        // Adjust parsing below once you test a real response (e.g., data.quote?.rate, data.rate, data.total, etc.)
        // Common fields might include: quote, rate, total_rate, distance, etc.
        let rateDisplay = "Rate information received.";
        if (data.quote && data.quote.rate) {
          rateDisplay = `Estimated Rate: \[ {data.quote.rate.toFixed(2)}`;
        } else if (data.rate) {
          rateDisplay = `Estimated Rate: \]{data.rate.toFixed(2)}`;
        } else {
          rateDisplay = `Full Response: ${JSON.stringify(data, null, 2)}`; // For debugging
        }

        resultDiv.innerHTML = `<strong>\( {rateDisplay}</strong><br><pre> \){JSON.stringify(data, null, 2)}</pre>`;
      } catch (err) {
        errorDiv.textContent = `Error: ${err.message}`;
        resultDiv.innerHTML = "";
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
